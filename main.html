<!doctype html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <style>
      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #f8f9fa;
        padding: 20px;
      }
      .form-wrapper {
        width: 100%;
        max-width: 900px;
        background-color: #fff;
        padding: 40px;
        border: 1px solid #dee2e6;
        border-radius: 4px;
      }
    </style>
  </head>

  <body>
    <div class="form-wrapper">
      <h2 class="text-center mb-4">Internship Form</h2>

      <form class="row g-3 needs-validation" novalidate>
        <!-- First Name -->
        <div class="col-md-4">
          <label for="first-name-input" class="form-label">First Name</label>
          <input
            type="text"
            class="form-control"
            id="first-name-input"
            required
          />
          <div class="invalid-feedback">First name required!</div>
        </div>

        <!-- Last Name -->
        <div class="col-md-4">
          <label for="last-name-input" class="form-label">Last Name</label>
          <input
            type="text"
            class="form-control"
            id="last-name-input"
            required
          />
          <div class="invalid-feedback">Last name required!</div>
        </div>

        <!-- Email Address -->
        <div class="col-md-4">
          <label for="email-input" class="form-label">Email Address</label>
          <input
            type="email"
            id="email-input"
            required
            class="form-control"
            placeholder="xyz@abc.com"
          />
          <div class="invalid-feedback">Email required!</div>
        </div>

        <!-- College Name -->
        <div class="col-md-6">
          <label for="college-input" class="form-label">College</label>
          <input type="text" class="form-control" id="college-input" required />
          <div class="invalid-feedback">Please provide a valid college.</div>
        </div>

        <!-- Graduation Year -->
        <div class="col-md-3">
          <label for="grad-year-select" class="form-label">Graduation Year</label>
          <select id="grad-year-select" class="form-select" required>
            <option value="" selected disabled>Choose...</option>
            <option value="2020">2020</option>
            <option value="2021">2021</option>
            <option value="2022">2022</option>
            <option value="2023">2023</option>
          </select>
          <div class="invalid-feedback">
            Please select a valid Graduation Year.
          </div>
        </div>

        <!-- Roll No (Must be type="text" for tests) -->
        <div class="col-md-3">
          <label for="roll-no-input" class="form-label">Roll No.</label>
          <input type="text" class="form-control" id="roll-no-input" required />
          <div class="invalid-feedback">Please provide a valid Roll no.</div>
        </div>

        <!-- Checkbox -->
        <div class="col-12 mt-4">
          <div class="form-check">
            <input
              type="checkbox"
              class="form-check-input"
              id="conditions-checkbox"
              required
            />
            <label class="form-check-label" for="conditions-checkbox"
              >Agree to terms and conditions</label
            >
            <div class="invalid-feedback">
              You must agree before submitting.
            </div>
          </div>
        </div>

        <!-- Submit Button -->
        <div class="col-12 mt-3">
          <button class="btn btn-primary" type="submit">Submit form</button>
        </div>
      </form>
    </div>

    <!-- Script connection to external script file -->
    <script type="text/javascript" src="./script.js"></script>
    <script>
      (() => {
          'use strict'
          const forms = document.querySelectorAll('.needs-validation')
          Array.from(forms).forEach(form => {
              form.addEventListener('submit', event => {
              if (!form.checkValidity()) {
                  event.preventDefault()
                  event.stopPropagation()
              }
              form.classList.add('was-validated')
          }, false)
          })
      })()
    </script>
  </body>
</html>
